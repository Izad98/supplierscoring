<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supplier QA Scorecard</title>
<style>
:root{
  --ink:#0f1b2d; --ink-2:#1b2a40; --surface:#f5f7f9; --card:#ffffff;
  --line:#e3e7ed; --line-2:#eef1f5; --muted:#637085; --text:#16202e;
  --accent:#0e7490; --accent-ink:#0a5562; --accent-soft:#e7f3f6;
  --green:#1f9d57; --green-d:#0b5d33; --green-soft:#e8f6ee;
  --amber:#e7a30c; --amber-d:#7a5300; --amber-soft:#fdf3da;
  --red:#d23b3b; --red-d:#7f1d1d; --red-soft:#fbe9e9;
  --mono: ui-monospace,"SF Mono","Cascadia Code",Consolas,"Liberation Mono",monospace;
  --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --shadow: 0 1px 2px rgba(15,27,45,.06), 0 8px 24px rgba(15,27,45,.06);
  --shadow-lg: 0 12px 40px rgba(15,27,45,.18);
  --r: 12px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--sans);color:var(--text);background:var(--surface);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
h1,h2,h3,h4{margin:0;line-height:1.2}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}

/* ---------- app bar ---------- */
.appbar{position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;display:flex;align-items:center;gap:18px;padding:12px 22px;box-shadow:0 1px 0 rgba(255,255,255,.05)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .mk{width:34px;height:34px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;background:linear-gradient(135deg,#1f9d57 0 33%,#e7a30c 33% 66%,#d23b3b 66% 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.brand .mk:after{content:"";width:16px;height:16px;border-radius:4px;background:rgba(255,255,255,.92)}
.brand h1{font-size:16px;letter-spacing:-.01em;font-weight:800;white-space:nowrap}
.brand small{display:block;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9fb0c3}
.appbar .spacer{flex:1}
.abtn{appearance:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#dce6f0;padding:8px 13px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.abtn:hover{background:rgba(255,255,255,.14);color:#fff}
.abtn.primary{background:var(--accent);border-color:transparent;color:#fff}
.abtn.primary:hover{background:#0b657a}
.abtn svg{width:15px;height:15px}
.topscore{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:5px 7px 5px 14px;margin-left:6px}
.topscore .ts-lab{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9fb0c3;font-weight:700}
.topscore .ts-num{font-family:var(--mono);font-weight:700;font-size:15px;color:#fff;letter-spacing:-.01em}
.topscore .ts-num small{font-size:11px;color:#9fb0c3;font-weight:600;margin-left:1px}
.topscore .ts-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;border-radius:999px;padding:4px 11px}
.topscore .ts-chip .d{width:9px;height:9px;border-radius:3px}
.topscore .ts-chip.green{background:var(--green-soft);color:var(--green-d)} .topscore .ts-chip.green .d{background:var(--green)}
.topscore .ts-chip.amber{background:var(--amber-soft);color:var(--amber-d)} .topscore .ts-chip.amber .d{background:var(--amber)}
.topscore .ts-chip.red{background:var(--red-soft);color:var(--red-d)} .topscore .ts-chip.red .d{background:var(--red)}
.topscore .ts-chip.idle{background:rgba(255,255,255,.12);color:#9fb0c3} .topscore .ts-chip.idle .d{background:#7e8aa0}
@media (max-width:720px){ .topscore .ts-lab{display:none} }
@media (max-width:560px){ .topscore{display:none} }
.menu{position:relative}
.menu-pop{position:absolute;right:0;top:calc(100% + 8px);background:#fff;color:var(--text);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);min-width:260px;padding:8px;display:none}
.menu.open .menu-pop{display:block}
.menu-pop h4{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 10px 4px}
.menu-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.menu-row:hover{background:var(--surface)}
.menu-row .meta{flex:1;min-width:0}
.menu-row .meta b{display:block;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu-row .meta span{color:var(--muted);font-size:11px}
.menu-row .del{color:var(--red);border:none;background:none;cursor:pointer;font-size:12px;padding:4px}
.menu-empty{padding:14px 10px;color:var(--muted);font-size:13px;text-align:center}

/* ---------- workspace ---------- */
.workspace{display:grid;grid-template-columns:230px minmax(0,1fr) 300px;gap:22px;max-width:1320px;margin:22px auto;padding:0 22px 60px}
body.report-view .workspace{display:none}
nav.steps{align-self:start;position:sticky;top:84px;display:flex;flex-direction:column;gap:4px}
.step{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--muted);font-weight:600;font-size:13.5px;border:1px solid transparent;text-align:left;background:none;width:100%}
.step:hover{background:#eef1f5;color:var(--text)}
.step.active{background:#fff;color:var(--ink);border-color:var(--line);box-shadow:var(--shadow)}
.step .idx{width:24px;height:24px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;font-size:12px;font-weight:700;background:#e7ebf1;color:var(--muted)}
.step.active .idx{background:var(--ink);color:#fff}
.step.done .idx{background:var(--green-soft);color:var(--green-d)}
.step .tick{margin-left:auto;color:var(--green);opacity:0;font-size:13px}
.step.done .tick{opacity:1}

.panel{min-width:0}
.panel-head{margin-bottom:16px}
.panel-head h2{font-size:23px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.panel-head p{margin:6px 0 0;color:var(--muted);font-size:13.5px;max-width:64ch}

.cardbox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.cardbox + .cardbox{margin-top:14px}

/* form fields */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:700;color:var(--ink-2);letter-spacing:.01em}
.field .hint{font-size:11.5px;color:var(--muted);font-weight:500}
input[type=text],input[type=date],input[type=month],input[type=number],textarea,select{
  font-family:inherit;font-size:14px;color:var(--text);border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 11px;width:100%}
textarea{resize:vertical;min-height:74px;line-height:1.45}
input:focus,textarea:focus,select:focus,.band:focus-visible,.step:focus-visible,.abtn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.full{grid-column:1/-1}

/* indicator */
.indicator{padding:16px;border:1px solid var(--line);border-radius:var(--r);background:#fff;box-shadow:var(--shadow)}
.indicator + .indicator{margin-top:12px}
.ind-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.ind-no{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:7px;padding:3px 7px;flex:0 0 auto;margin-top:1px}
.ind-name{font-weight:700;color:var(--ink);font-size:15px}
.ind-meta{font-size:12px;color:var(--muted);margin-top:2px}
.ind-pts{margin-left:auto;text-align:right;flex:0 0 auto}
.ind-pts .v{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--ink)}
.ind-pts .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.bands{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.band{border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 6px 8px;cursor:pointer;text-align:center;transition:transform .05s, border-color .1s}
.band:hover{border-color:#c7ced7}
.band:active{transform:translateY(1px)}
.band .scale{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700}
.band .lab{font-size:12.5px;font-weight:600;color:var(--text);margin-top:3px}
.band .mk{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.band[data-sel="1"]{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}
.band[data-sel="1"] .scale,.band[data-sel="1"] .mk{color:var(--accent-ink)}
.band.b0[data-sel="1"]{border-color:var(--red);background:var(--red-soft);box-shadow:inset 0 0 0 1px var(--red)}
.band.b0[data-sel="1"] .scale,.band.b0[data-sel="1"] .mk,.band.b0[data-sel="1"] .lab{color:var(--red-d)}
.band.b4[data-sel="1"]{border-color:var(--green);background:var(--green-soft);box-shadow:inset 0 0 0 1px var(--green)}
.band.b4[data-sel="1"] .scale,.band.b4[data-sel="1"] .mk,.band.b4[data-sel="1"] .lab{color:var(--green-d)}
.note-row{margin-top:11px}
.note-row label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* critical toggle (GMP) */
.bi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bi button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:13px;cursor:pointer;text-align:left;font-size:14px;font-weight:600;color:var(--text);display:flex;gap:10px;align-items:center}
.bi button .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;background:#c7ced7}
.bi button[data-sel="1"].ok{border-color:var(--green);background:var(--green-soft);color:var(--green-d)}
.bi button[data-sel="1"].ok .dot{background:var(--green)}
.bi button[data-sel="1"].bad{border-color:var(--red);background:var(--red-soft);color:var(--red-d)}
.bi button[data-sel="1"].bad .dot{background:var(--red)}

/* checkboxes / chips */
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--text)}
.chip input{accent-color:var(--accent);width:15px;height:15px}
.chip[data-on="1"]{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}

/* evidence */
.drop{border:1.5px dashed var(--line);border-radius:var(--r);background:#fbfcfd;padding:22px;text-align:center;color:var(--muted);cursor:pointer}
.drop:hover{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.drop b{color:var(--ink)}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px}
.shot{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.shot .img{aspect-ratio:4/3;background:#0f1b2d center/cover no-repeat}
.shot .cap{padding:8px}
.shot .cap input{font-size:12.5px;border:none;border-bottom:1px solid var(--line-2);border-radius:0;padding:5px 2px}
.shot .cap input:focus{outline:none;border-bottom-color:var(--accent)}
.shot .rm{width:100%;border:none;background:#fff;color:var(--red);font-size:12px;font-weight:600;padding:7px;cursor:pointer;border-top:1px solid var(--line-2)}
.shot .rm:hover{background:var(--red-soft)}

/* actions table */
.atable{width:100%;border-collapse:collapse;font-size:13px}
.atable th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--line)}
.atable td{padding:5px 6px;border-bottom:1px solid var(--line-2);vertical-align:top}
.atable input{font-size:13px;padding:7px 8px}
.atable .rm{border:none;background:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;padding:6px}
.add-row{margin-top:8px;border:1px dashed var(--line);background:none;color:var(--accent-ink);font-weight:600;font-size:13px;padding:8px 12px;border-radius:9px;cursor:pointer}
.add-row:hover{background:var(--accent-soft);border-color:var(--accent)}

.note{background:var(--accent-soft);border:1px solid #cfe6ec;color:var(--accent-ink);border-radius:10px;padding:11px 13px;font-size:13px;display:flex;gap:9px;align-items:flex-start}
.note svg{width:16px;height:16px;flex:0 0 auto;margin-top:1px}
.warn{background:var(--amber-soft);border-color:#f0dca0;color:var(--amber-d)}
.subhead{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-.01em;margin:4px 0 10px;display:flex;align-items:center;gap:8px}
.subhead .ln{flex:1;height:1px;background:var(--line)}

.foot-nav{display:flex;justify-content:space-between;gap:10px;margin-top:18px}
.navbtn{border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:600;font-size:13.5px;padding:10px 16px;border-radius:10px;cursor:pointer}
.navbtn:hover{background:#eef1f5}
.navbtn.next{background:var(--ink);color:#fff;border-color:var(--ink)}
.navbtn.next:hover{background:var(--ink-2)}

/* ---------- live panel ---------- */
aside.live{align-self:start;position:sticky;top:84px;display:flex;flex-direction:column;gap:14px}
.gaugecard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;text-align:center}
.gauge{position:relative;width:150px;height:150px;margin:2px auto 4px}
.gauge svg{transform:rotate(-90deg)}
.gauge .center{position:absolute;inset:0;display:grid;place-items:center;line-height:1}
.gauge .num{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.gauge .den{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
.cardchip{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;border-radius:999px;padding:7px 14px}
.cardchip .sq{width:11px;height:11px;border-radius:3px}
.cardchip.green{background:var(--green-soft);color:var(--green-d)} .cardchip.green .sq{background:var(--green)}
.cardchip.amber{background:var(--amber-soft);color:var(--amber-d)} .cardchip.amber .sq{background:var(--amber)}
.cardchip.red{background:var(--red-soft);color:var(--red-d)} .cardchip.red .sq{background:var(--red)}
.cardchip.idle{background:#eef1f5;color:var(--muted)} .cardchip.idle .sq{background:#c7ced7}
.prov{font-size:11px;color:var(--muted);margin-top:9px}
.bars{display:flex;flex-direction:column;gap:11px}
.bar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.bar .top b{font-weight:700;color:var(--ink)}
.bar .top span{font-family:var(--mono);color:var(--muted)}
.bar .track{height:8px;border-radius:6px;background:#eef1f5;overflow:hidden}
.bar .fill{height:100%;border-radius:6px;background:var(--accent);transition:width .35s ease}
.completion{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;border-top:1px solid var(--line-2);margin-top:4px;padding-top:11px}
.completion b{color:var(--ink);font-family:var(--mono)}

/* ---------- report ---------- */
#report{display:none}
body.report-view #report{display:block}
.report-toolbar{position:sticky;top:0;z-index:20;background:var(--ink);color:#fff;display:flex;align-items:center;gap:12px;padding:11px 22px}
.report-toolbar .spacer{flex:1}
.report-toolbar small{color:#9fb0c3;font-weight:600}
.sheet{max-width:920px;margin:26px auto;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-lg);border-radius:14px;overflow:hidden}
.rep-head{padding:26px 32px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:24px;align-items:flex-start}
.rep-head .ttl h2{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-ink);font-weight:800}
.rep-head .ttl h1{font-size:27px;font-weight:800;letter-spacing:-.025em;color:var(--ink);margin-top:5px}
.rep-head .ttl .sup{font-size:15px;color:var(--muted);margin-top:3px}
.rep-meta{text-align:right;font-size:12.5px;color:var(--muted);line-height:1.7;white-space:nowrap}
.rep-meta b{color:var(--ink);font-weight:700}
.rep-body{padding:26px 32px}
.rep-section{margin-top:30px}
.rep-section:first-child{margin-top:0}
.rep-section > h3{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:13px;display:flex;align-items:center;gap:10px}
.rep-section > h3:after{content:"";flex:1;height:1px;background:var(--line)}

.verdict{display:grid;grid-template-columns:240px 1fr;gap:26px;align-items:center}
.refcard{aspect-ratio:5/7;border-radius:16px;padding:20px;color:#fff;position:relative;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
.refcard:before{content:"";position:absolute;inset:0;background:linear-gradient(150deg,rgba(255,255,255,.22),rgba(255,255,255,0) 42%)}
.refcard.green{background:linear-gradient(160deg,#23a85e,#157a42)}
.refcard.amber{background:linear-gradient(160deg,#efb01f,#c8870a)}
.refcard.red{background:linear-gradient(160deg,#e04646,#a82323)}
.refcard .rc-top{display:flex;justify-content:space-between;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.92;position:relative}
.refcard .rc-letter{font-size:96px;font-weight:800;text-align:center;letter-spacing:-.04em;position:relative;text-shadow:0 4px 18px rgba(0,0,0,.18)}
.refcard .rc-foot{position:relative}
.refcard .rc-foot .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.9}
.refcard .rc-foot .nm{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.verdict .vd h4{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.verdict .vd p{margin:8px 0 0;font-size:14px;color:#37445a}
.vfacts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.vfact{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:#fbfcfd}
.vfact .k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
.vfact .v{font-size:14px;font-weight:700;color:var(--ink);margin-top:3px}
.reason{margin-top:14px;font-size:13px;border-left:3px solid var(--accent);background:var(--accent-soft);color:var(--accent-ink);padding:10px 14px;border-radius:0 8px 8px 0}

.scorebig{display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center}
.scorebig .num{font-family:var(--mono);font-weight:700;font-size:62px;color:var(--ink);letter-spacing:-.03em;line-height:1}
.scorebig .num small{font-size:22px;color:var(--muted)}
.scorebig .cats{flex:1}
.rt{width:100%;border-collapse:collapse;font-size:13.5px}
.rt thead th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800;padding:8px 10px;border-bottom:2px solid var(--ink)}
.rt tbody td{padding:9px 10px;border-bottom:1px solid var(--line-2);vertical-align:top}
.rt .catrow td{background:#f5f7f9;font-weight:800;color:var(--ink);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:7px 10px}
.rt .num{font-family:var(--mono);text-align:right;white-space:nowrap}
.rt .bandtag{font-weight:700}
.rt .obs{color:#37445a}
.rt .b0 .bandtag{color:var(--red-d)} .rt .b4 .bandtag{color:var(--green-d)}
.rt tfoot td{padding:11px 10px;border-top:2px solid var(--ink);font-weight:800;color:var(--ink)}
.rt tfoot .num{font-size:15px}

.rep-evidence{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.rev{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.rev .img{aspect-ratio:4/3;background:#0f1b2d;overflow:hidden}
.rev .img img{width:100%;height:100%;object-fit:cover;display:block}
.rev .cap{padding:8px 10px;font-size:12px;color:#37445a}
.rep-obs{font-size:14px;color:#26303f;white-space:pre-wrap;border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:#fbfcfd;line-height:1.6}

/* escalation notice */
.notice{border:2px solid var(--ink);border-radius:12px;overflow:hidden}
.notice .nh{padding:14px 18px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.notice.green .nh{background:var(--green)} .notice.amber .nh{background:var(--amber)} .notice.red .nh{background:var(--red)}
.notice .nh h3{font-size:18px;font-weight:800;letter-spacing:-.01em;color:#fff}
.notice .nh .ref{font-size:12px;font-weight:700;text-align:right;opacity:.95}
.nbody{padding:16px 18px}
.ngrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.nrow{font-size:13px;margin-bottom:7px}
.nrow .k{display:inline-block;min-width:120px;color:var(--muted);font-weight:700}
.nrow .v{font-weight:600;color:var(--ink)}
.issue-tags{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 10px}
.itag{font-size:12px;font-weight:700;border-radius:999px;padding:4px 11px;border:1px solid var(--line);color:var(--muted)}
.itag.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.nblock h5{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:14px 0 6px}
.nblock .txt{font-size:13px;color:#26303f;white-space:pre-wrap;border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:#fbfcfd;min-height:54px}
.ndefect{width:100%;border:1px solid var(--line);border-radius:8px;aspect-ratio:4/3;background:#0f1b2d;overflow:hidden}
.ndefect img{width:100%;height:100%;object-fit:cover;display:block}
.restr{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.restr .ri{display:flex;gap:9px;align-items:center;font-size:13px}
.restr .box{width:16px;height:16px;border:1.5px solid var(--ink);border-radius:4px;flex:0 0 auto;display:grid;place-items:center;font-size:12px;font-weight:800}
.restr .box.on{background:var(--ink);color:#fff}
.naction{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
.naction th{text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--ink)}
.naction td{padding:6px 8px;border-bottom:1px solid var(--line-2)}
.rep-foot{padding:16px 32px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between}
.sign{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:18px}
.sigbox{border-top:1.5px solid var(--ink);padding-top:8px;font-size:12px}
.sigbox .who{font-weight:700;color:var(--ink)}
.sigbox .role{color:var(--muted)}

@media (max-width:1080px){ .workspace{grid-template-columns:1fr} nav.steps{position:static;flex-direction:row;flex-wrap:wrap;top:auto} aside.live{position:static} }
@media (max-width:680px){ .grid2,.grid3{grid-template-columns:1fr} .bands{grid-template-columns:repeat(3,1fr)} .verdict{grid-template-columns:1fr} .scorebig{grid-template-columns:1fr} .refcard{max-width:220px;margin:0 auto} .ngrid{grid-template-columns:1fr} }

@media print{
  @page{margin:14mm}
  html,body{background:#fff!important}
  .appbar,.report-toolbar,.workspace{display:none!important}
  body.report-view #report{display:block}
  .sheet{box-shadow:none;border:none;margin:0;max-width:none;border-radius:0}
  .rep-section{break-inside:avoid}
  .notice,.verdict,.rev,.indicator,.vfact,.refcard{break-inside:avoid}
  .pb{break-before:page}
  /* browsers drop background colours when printing by default;
     force them so the card, chips and bars actually appear in the PDF */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
}
@media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <div class="mk"></div>
    <div><h1>Supplier QA Scorecard</h1><small>Monthly performance &amp; card</small></div>
  </div>
  <div class="topscore" id="topScore"></div>
  <div class="spacer"></div>
  <button class="abtn" id="btnNew" title="Start a new blank evaluation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New</button>
  <button class="abtn" id="btnSave">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>Save</button>
  <div class="menu" id="savedMenu">
    <button class="abtn" id="btnSaved">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18M3 12h18M3 17h18"/></svg>Saved <span id="savedCount" style="font-family:var(--mono);opacity:.7"></span></button>
    <div class="menu-pop">
      <h4>Saved evaluations (this browser)</h4>
      <div id="savedList"></div>
      <div style="border-top:1px solid var(--line);margin-top:6px;padding-top:6px;display:flex;gap:6px">
        <button class="abtn" style="flex:1;color:var(--text);justify-content:center" id="btnExport">Export JSON</button>
        <button class="abtn" style="flex:1;color:var(--text);justify-content:center" id="btnImport">Import JSON</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </div>
  </div>
  <button class="abtn primary" id="btnGenerate">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M5 3h9l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M9 13l2 2 4-4"/></svg>Generate scorecard</button>
</header>

<!-- ============ WORKSPACE ============ -->
<div class="workspace">
  <nav class="steps" id="steps"></nav>
  <main class="panel" id="panel"></main>
  <aside class="live" id="live"></aside>
</div>

<!-- ============ REPORT ============ -->
<div id="report">
  <div class="report-toolbar">
    <button class="abtn" id="btnBack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to editor</button>
    <small>Download the scorecard as a <b style="color:#fff">PDF</b>, or as a self-contained HTML copy.</small>
    <div class="spacer"></div>
    <button class="abtn" id="btnDownloadHtml" title="Download a self-contained HTML copy you can open in any browser (works offline)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M5 3h9l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>Download HTML</button>
    <button class="abtn primary" id="btnDownloadPdf" title="Download the scorecard as a PDF file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Download PDF</button>
  </div>
  <div class="sheet" id="sheet"></div>
</div>

<!-- PDF generation (loads when online / hosted; offline use falls back to HTML download) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
"use strict";

/* ---------------- scoring framework (from the QA scoring matrix) ---------------- */
var RATING = [0,2,4,6,8];                 // band index -> rating on the 0–8 scale
var SCALE  = ["Very poor","Poor","Average","Good","Excellent"];
var CRITERIA = [
  { cat:"Product Quality", items:[
    { id:"pq1", name:"Defect rate (reject qty \u00F7 total received)", max:20,
      bands:[">5%","3\u20135%","2\u20133%","1\u20132%","<1%"] },
    { id:"pq2", name:"Critical GMP violation (foreign bodies, pest)", max:10, critical:true,
      bands:["Violation found","","","","Zero findings"] }
  ]},
  { cat:"Process Quality", items:[
    { id:"pc1", name:"Out-of-stock due to quality defect", max:10,
      bands:[">3","3","2","1","0"] },
    { id:"pc2", name:"Transport condition (packaging, contamination, traceability, palletization)", max:10,
      bands:["Multiple","Major","Moderate","Minor","Zero findings"] },
    { id:"pc3", name:"Repetitive / recurring NCRs", max:20, recurring:true,
      bands:[">3","3","2","1","0"] }
  ]},
  { cat:"NCR Effectiveness", items:[
    { id:"ne1", name:"Avg. time for NCR feedback & effectiveness", max:10,
      bands:[">14 days","12\u201314 days","10\u201312 days","7\u201310 days","1\u20137 days"] },
    { id:"ne2", name:"NCR action closing rate (closed \u00F7 total)", max:10,
      bands:["<60%","60\u201369%","70\u201379%","80\u201399%","100%"] },
    { id:"ne3", name:"Consumer-complaint closing rate", max:10,
      bands:["<60%","60\u201369%","70\u201379%","80\u201399%","100%"] }
  ]}
];
var ITEM_BY_ID = {}; CRITERIA.forEach(function(c){ c.items.forEach(function(it){ it.cat=c.cat; ITEM_BY_ID[it.id]=it; }); });
var TOTAL_MAX = 100;

/* card meanings, from the Escalation Matrix slide */
var CARD = {
  green:{ key:"green", letter:"G", name:"Green Card", title:"Minor defects \u2014 supplier in good standing",
    body:"Performance is acceptable. Communicate findings to plant workers and management and continue routine monitoring.",
    comm:"Plant workers & management", timeline:"5 days" },
  amber:{ key:"amber", letter:"Y", name:"Yellow Card", title:"Major defect / second occurrence \u2014 caution",
    body:"Performance has slipped or a major defect has recurred. Escalate to higher management and agree corrective actions.",
    comm:"Higher management of vendor & HCB", timeline:"5 days" },
  red:{ key:"red", letter:"R", name:"Red Card", title:"Critical defect, GMP/QMS violation or repeat major defect",
    body:"Critical issue or repeated major defects. Escalate immediately, finalise RCA & CAPA, and apply controls (e.g. controlled shipping, temporary PO hold).",
    comm:"Higher management of vendor & HCB", timeline:"3 days" }
};
var SEV = { green:0, amber:1, red:2 };

/* ---------------- state ---------------- */
function todayISO(){ var d=new Date(); return d.toISOString().slice(0,10); }
function thisMonth(){ return new Date().toISOString().slice(0,7); }
function autoRef(){ var d=new Date(); var s=d.getFullYear().toString().slice(2)+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2); return s+"#001"; }

function blankState(){
  return {
    meta:{ supplier:"", site:"", material:"", month:thisMonth(), ref:autoRef(), dateIssue:todayISO(), evaluator:"", approver:"" },
    ratings:{}, notes:{}, evidence:[], overall:"",
    esc:{ critical:false, occurrence:"none",
          issue:{quality:false,delivery:false,compliance:false,oos:false},
          ncr:"", recurring:"", financial:"", problem:"", defect:null,
          actions:[
            {action:"Detailed RCA (5-Why, Fishbone, etc.)", owner:"Supplier", due:""},
            {action:"Containment action", owner:"Supplier", due:""},
            {action:"Corrective & Preventive Action plan (CAPA)", owner:"Supplier", due:""},
            {action:"On-site audit or review (if needed)", owner:"HCB QA", due:""}
          ],
          restrict:{shipping:false, hold:false, other:""} },
    thresholds:{ green:80, yellow:60 },
    step:0
  };
}
var state = blankState();

/* ---------------- scoring ---------------- */
function awarded(id){ var b=state.ratings[id]; if(b==null) return 0; return ITEM_BY_ID[id].max * RATING[b]/8; }
function total(){ var s=0; for(var id in ITEM_BY_ID) s+=awarded(id); return s; }
function scoredCount(){ var n=0; for(var id in ITEM_BY_ID) if(state.ratings[id]!=null) n++; return n; }
function totalCount(){ return Object.keys(ITEM_BY_ID).length; }
function catTotals(){
  return CRITERIA.map(function(c){
    var got=0,mx=0; c.items.forEach(function(it){ mx+=it.max; got+=awarded(it.id); });
    return {cat:c.cat, got:got, max:mx, pct: mx? got/mx*100:0};
  });
}
function scoreCardKey(score){
  if(score>=state.thresholds.green) return "green";
  if(score>=state.thresholds.yellow) return "amber";
  return "red";
}
function overrideKey(){
  if(state.esc.critical || state.esc.occurrence==="third") return "red";
  if(state.esc.occurrence==="second") return "amber";
  return null;
}
function finalCard(){
  var score=total();
  var sc=scoreCardKey(score);
  var ov=overrideKey();
  var key = (ov && SEV[ov]>SEV[sc]) ? ov : sc;
  return { key:key, score:score, scoreKey:sc, overrideKey:ov };
}
function reasonText(fc){
  var s=fc.score.toFixed(1);
  if(fc.overrideKey && SEV[fc.overrideKey]>SEV[fc.scoreKey]){
    var why = state.esc.critical ? "a critical defect / GMP / QMS violation"
            : state.esc.occurrence==="third" ? "a major defect recurring more than twice"
            : "a major defect on its second occurrence";
    return "Escalated to "+CARD[fc.key].name+" by "+why+", overriding the score-based result ("+s+"/100, "+CARD[fc.scoreKey].name+").";
  }
  if(fc.key==="green") return "Score "+s+"/100 \u2014 at or above the "+state.thresholds.green+"-point Green threshold.";
  if(fc.key==="amber") return "Score "+s+"/100 \u2014 between the "+state.thresholds.yellow+" and "+state.thresholds.green+"-point thresholds.";
  return "Score "+s+"/100 \u2014 below the "+state.thresholds.yellow+"-point Yellow threshold.";
}

/* ---------------- helpers ---------------- */
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function el(id){ return document.getElementById(id); }
function set(obj,path,val){ var p=path.split("."),o=obj; for(var i=0;i<p.length-1;i++)o=o[p[i]]; o[p[p.length-1]]=val; }
function get(obj,path){ var p=path.split("."),o=obj; for(var i=0;i<p.length;i++){ if(o==null)return undefined; o=o[p[i]]; } return o; }

/* image downscale -> dataURL (keeps storage light) */
function readImage(file, cb){
  var fr=new FileReader();
  fr.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1200, w=img.width, h=img.height;
      if(w>max||h>max){ var r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      try{ cb(cv.toDataURL("image/jpeg",0.82)); }catch(e){ cb(fr.result); }
    };
    img.onerror=function(){ cb(fr.result); };
    img.src=fr.result;
  };
  fr.readAsDataURL(file);
}

/* ---------------- steps ---------------- */
var STEPS = [
  {key:"info",  label:"Supplier"},
  {key:"pq",    label:"Product Quality"},
  {key:"pc",    label:"Process Quality"},
  {key:"ne",    label:"NCR Effectiveness"},
  {key:"esc",   label:"Escalation"},
  {key:"evi",   label:"Evidence & notes"},
  {key:"rev",   label:"Review & generate"}
];
function stepDone(k){
  if(k==="info") return !!state.meta.supplier.trim();
  if(k==="pq") return CRITERIA[0].items.every(function(it){return state.ratings[it.id]!=null;});
  if(k==="pc") return CRITERIA[1].items.every(function(it){return state.ratings[it.id]!=null;});
  if(k==="ne") return CRITERIA[2].items.every(function(it){return state.ratings[it.id]!=null;});
  if(k==="esc") return true;
  if(k==="evi") return true;
  return false;
}
function renderSteps(){
  el("steps").innerHTML = STEPS.map(function(s,i){
    var done=stepDone(s.key), active=i===state.step;
    return '<button class="step '+(active?"active ":"")+(done?"done":"")+'" data-step="'+i+'">'
      + '<span class="idx">'+(i+1)+'</span>'+esc(s.label)
      + '<span class="tick">\u2713</span></button>';
  }).join("");
}

/* ---------------- panels ---------------- */
function indicatorHTML(it, n){
  var sel=state.ratings[it.id];
  var pts=(sel!=null)?awarded(it.id).toFixed(1):"\u2013";
  if(it.critical){
    var v=state.ratings[it.id];
    return '<div class="indicator" data-id="'+it.id+'">'
      +'<div class="ind-top"><span class="ind-no">'+n+'</span>'
      +'<div><div class="ind-name">'+esc(it.name)+'</div>'
      +'<div class="ind-meta">Knock-out criterion \u00B7 worth '+it.max+' pts \u00B7 any violation forces a Red Card</div></div>'
      +'<div class="ind-pts"><div class="v">'+pts+'</div><div class="l">/ '+it.max+'</div></div></div>'
      +'<div class="bi">'
      +'<button class="ok" data-crit="4" data-sel="'+(v===4?1:0)+'"><span class="dot"></span>Zero findings (compliant)</button>'
      +'<button class="bad" data-crit="0" data-sel="'+(v===0?1:0)+'"><span class="dot"></span>Violation found</button>'
      +'</div>'+noteHTML(it)+'</div>';
  }
  var bands=it.bands.map(function(lab,bi){
    if(!lab) return "";
    return '<button class="band b'+bi+'" data-band="'+bi+'" data-sel="'+(sel===bi?1:0)+'">'
      +'<div class="scale">'+esc(SCALE[bi])+'</div>'
      +'<div class="lab">'+esc(lab)+'</div>'
      +'<div class="mk">'+(it.max*RATING[bi]/8)+' pts</div></button>';
  }).join("");
  return '<div class="indicator" data-id="'+it.id+'">'
    +'<div class="ind-top"><span class="ind-no">'+n+'</span>'
    +'<div><div class="ind-name">'+esc(it.name)+'</div>'
    +'<div class="ind-meta">Worth '+it.max+' pts \u00B7 select the band that matches this month</div></div>'
    +'<div class="ind-pts"><div class="v">'+pts+'</div><div class="l">/ '+it.max+'</div></div></div>'
    +'<div class="bands">'+bands+'</div>'+noteHTML(it)+'</div>';
}
function noteHTML(it){
  return '<div class="note-row"><label for="note-'+it.id+'">Observation / evidence note</label>'
    +'<textarea id="note-'+it.id+'" data-note="'+it.id+'" placeholder="What was observed? Reference NCR numbers, dates, quantities\u2026" style="min-height:54px;margin-top:5px">'+esc(state.notes[it.id]||"")+'</textarea></div>';
}
function catPanel(idx){
  var c=CRITERIA[idx]; var start=0; for(var i=0;i<idx;i++)start+=CRITERIA[i].items.length;
  var html=c.items.map(function(it,j){ return indicatorHTML(it, start+j+1); }).join("");
  return '<div class="panel-head"><h2>'+esc(c.cat)+'</h2>'
    +'<p>Rate each indicator for the selected month. Points are weighted automatically toward the 100-point total.</p></div>'+html;
}

function infoPanel(){
  var m=state.meta;
  return '<div class="panel-head"><h2>Supplier &amp; period</h2><p>Who is being evaluated, and for which month.</p></div>'
  +'<div class="cardbox"><div class="grid2">'
  + fieldText("Supplier name","meta.supplier",m.supplier,"e.g. Acme Packaging (Pvt) Ltd")
  + fieldText("Site / location","meta.site",m.site,"e.g. Biyagama plant")
  + fieldText("Material / category","meta.material",m.material,"e.g. Folding cartons (optional)")
  + field('<label for="f-month">Evaluation month</label><input type="month" id="f-month" data-field="meta.month" value="'+esc(m.month)+'">')
  + fieldText("Reference number","meta.ref",m.ref,"")
  + field('<label for="f-date">Date of issue</label><input type="date" id="f-date" data-field="meta.dateIssue" value="'+esc(m.dateIssue)+'">')
  + fieldText("Evaluated by","meta.evaluator",m.evaluator,"Name / role")
  + fieldText("Reviewed / approved by","meta.approver",m.approver,"Name / role")
  +'</div></div>';
}
function fieldText(label,path,val,ph){
  var id="f-"+path.replace(/\./g,"-");
  return field('<label for="'+id+'">'+esc(label)+'</label><input type="text" id="'+id+'" data-field="'+path+'" value="'+esc(val)+'" placeholder="'+esc(ph)+'">');
}
function field(inner){ return '<div class="field">'+inner+'</div>'; }

function escPanel(){
  var e=state.esc;
  var occ=[["none","No major defect"],["first","Major \u2013 first time"],["second","Major \u2013 second occurrence"],["third","Major \u2013 more than twice"]];
  var occBtns=occ.map(function(o){ return '<button class="chip" data-occ="'+o[0]+'" data-on="'+(e.occurrence===o[0]?1:0)+'">'+esc(o[1])+'</button>'; }).join("");
  var issues=[["quality","Quality"],["delivery","Delivery"],["compliance","Compliance"],["oos","Out of stock"]];
  var issueBtns=issues.map(function(it){ return '<label class="chip" data-on="'+(e.issue[it[0]]?1:0)+'"><input type="checkbox" data-issue="'+it[0]+'" '+(e.issue[it[0]]?"checked":"")+'>'+esc(it[1])+'</label>'; }).join("");
  var rows=e.actions.map(function(a,i){
    return '<tr><td><input type="text" data-act="'+i+'.action" value="'+esc(a.action)+'" placeholder="Action"></td>'
      +'<td style="width:150px"><input type="text" data-act="'+i+'.owner" value="'+esc(a.owner)+'" placeholder="Owner"></td>'
      +'<td style="width:140px"><input type="text" data-act="'+i+'.due" value="'+esc(a.due)+'" placeholder="Due date"></td>'
      +'<td style="width:30px"><button class="rm" data-actrm="'+i+'" title="Remove">\u00D7</button></td></tr>';
  }).join("");
  return '<div class="panel-head"><h2>Escalation &amp; card triggers</h2>'
    +'<p>These follow the escalation matrix. A critical / GMP / QMS violation forces a Red Card; a major defect on its 2nd occurrence forces at least Yellow; more than twice forces Red \u2014 regardless of the numeric score.</p></div>'
    +'<div class="cardbox"><div class="subhead">Knock-out triggers<span class="ln"></span></div>'
      +'<label class="chip" style="margin-bottom:12px" data-on="'+(e.critical?1:0)+'"><input type="checkbox" id="critChk" '+(e.critical?"checked":"")+'>Critical defect, GMP or QMS violation identified this month</label>'
      +'<div class="field"><label>Major-defect occurrence this period</label><div class="chips">'+occBtns+'</div></div>'
    +'</div>'
    +'<div class="cardbox"><div class="subhead">Supplier Escalation Notice<span class="ln"></span></div>'
      +'<div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>'
        +'These details print on the scorecard automatically when the card is Yellow or Red.</div>'
      +'<div class="field" style="margin-top:14px"><label>Issue type</label><div class="chips">'+issueBtns+'</div></div>'
      +'<div class="grid3" style="margin-top:4px">'
        + fieldText("NCR number","esc.ncr",e.ncr,"e.g. NCR-2026-014")
        + field('<label>Recurring</label><select data-field="esc.recurring"><option value="">\u2013</option><option value="Yes"'+(e.recurring==="Yes"?" selected":"")+'>Yes</option><option value="No"'+(e.recurring==="No"?" selected":"")+'>No</option></select>')
        + fieldText("Financial impact","esc.financial",e.financial,"e.g. LKR 250,000")
      +'</div>'
      +'<div class="field" style="margin-top:4px"><label for="probDesc">Problem description</label><textarea id="probDesc" data-field="esc.problem" placeholder="Describe the defect / deviation\u2026">'+esc(e.problem)+'</textarea></div>'
      +'<div class="field" style="margin-top:10px"><label>Defect image</label>'
        + (e.defect ? '<div style="display:flex;gap:12px;align-items:flex-start"><img src="'+e.defect+'" style="width:160px;border-radius:8px;border:1px solid var(--line)"><button class="navbtn" id="defectRm">Remove image</button></div>'
                    : '<div class="drop" id="defectDrop"><b>Add defect image</b><br><span style="font-size:12px">click to upload</span><input type="file" id="defectFile" accept="image/*" hidden></div>')

      +'<div class="subhead" style="margin-top:18px">Actions required<span class="ln"></span></div>'

      +'<button class="add-row" id="addAction">+ Add action</button>'
      +'<div class="subhead" style="margin-top:18px">Restrictions<span class="ln"></span></div>'

        +'<label class="chip" data-on="'+(e.restrict.hold?1:0)+'"><input type="checkbox" data-restrict="hold" '+(e.restrict.hold?"checked":"")+'>Temporary hold on new PO issuance</label>'
      +'</div>'
      + fieldText("Other restriction","esc.restrict.other",e.restrict.other,"optional")
    +'</div>';

function eviPanel(){
  var shots=state.evidence.map(function(s,i){
    return '<div class="shot"><div class="img" style="background-image:url('+JSON.stringify(s.data)+')"></div>'
      +'<div class="cap"><input type="text" data-cap="'+i+'" value="'+esc(s.caption||"")+'" placeholder="Caption\u2026"></div>'
      +'<button class="rm" data-evirm="'+i+'">Remove</button></div>';
  }).join("");
  return '<div class="panel-head"><h2>Evidence &amp; observations</h2><p>Attach photos that support the ratings, and add an overall summary. Images are embedded directly in the scorecard.</p></div>'
    +'<div class="cardbox"><div class="subhead">Evidence images<span class="ln"></span></div>'
      +'<div class="drop" id="eviDrop"><b>Add evidence photos</b><br><span style="font-size:12px">click to upload one or more images</span><input type="file" id="eviFile" accept="image/*" multiple hidden></div>'
      + (shots ? '<div class="gallery">'+shots+'</div>' : '')
    +'</div>'
    +'<div class="cardbox"><div class="subhead">Overall observations<span class="ln"></span></div>'
      +'<textarea id="overall" data-field="overall" placeholder="Summary of the month: trends, repeat issues, supplier responsiveness, agreed next steps\u2026" style="min-height:120px">'+esc(state.overall)+'</textarea></div>';
}

function revPanel(){
  var fc=finalCard(); var n=scoredCount(), tot=totalCount();
  var missing = (n<tot);
  var rows=CRITERIA.map(function(c){
    return c.items.map(function(it){
      var b=state.ratings[it.id];
      var band = it.critical ? (b===4?"Zero findings":b===0?"Violation":"\u2013")
                : (b!=null?(SCALE[b]+" \u2014 "+it.bands[b]):"<span style='color:var(--red)'>not scored</span>");
      return '<tr><td style="font-size:12.5px">'+esc(it.name)+'</td><td>'+band+'</td>'
        +'<td class="num">'+(b!=null?awarded(it.id).toFixed(1):"\u2013")+'</td></tr>';
    }).join("");
  }).join("");
  return '<div class="panel-head"><h2>Review &amp; generate</h2><p>Confirm the result, set the card thresholds your team uses, then generate the printable scorecard.</p></div>'
    + (missing ? '<div class="note warn" style="margin-bottom:14px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>'+(tot-n)+' indicator(s) not yet scored \u2014 unscored items count as zero in the total.</div>' : '')
    +'<div class="cardbox" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'
      +'<div style="font-family:var(--mono);font-weight:700;font-size:42px;color:var(--ink);line-height:1">'+fc.score.toFixed(1)+'<span style="font-size:18px;color:var(--muted)">/100</span></div>'
      +'<div class="cardchip '+fc.key+'" style="font-size:14px"><span class="sq"></span>'+esc(CARD[fc.key].name)+'</div>'
      +'<div style="flex:1;min-width:220px;font-size:13px;color:#37445a">'+esc(reasonText(fc))+'</div>'
    +'</div>'
    +'<div class="cardbox"><div class="subhead">Card thresholds<span class="ln"></span></div>'
      +'<div class="grid2">'
        + field('<label for="thg">Green at or above</label><input type="number" id="thg" data-field="thresholds.green" value="'+state.thresholds.green+'" min="0" max="100"><span class="hint">score \u2265 this \u2192 Green</span>')
        + field('<label for="thy">Yellow at or above</label><input type="number" id="thy" data-field="thresholds.yellow" value="'+state.thresholds.yellow+'" min="0" max="100"><span class="hint">\u2265 this & below Green \u2192 Yellow; below \u2192 Red</span>')
      +'</div></div>'
    +'<div class="cardbox"><div class="subhead">Indicator summary<span class="ln"></span></div>'
      +'<table class="rt"><thead><tr><th>Indicator</th><th>Band</th><th class="num">Points</th></tr></thead><tbody>'+rows
      +'</tbody><tfoot><tr><td>Total</td><td></td><td class="num">'+fc.score.toFixed(1)+' / 100</td></tr></tfoot></table></div>'
    +'<div style="text-align:center;margin-top:18px"><button class="navbtn next" id="genBtn2" style="padding:13px 26px;font-size:15px">Generate scorecard \u2192</button></div>';
}

function renderPanel(){
  var k=STEPS[state.step].key, html="";
  if(k==="info") html=infoPanel();
  else if(k==="pq") html=catPanel(0);
  else if(k==="pc") html=catPanel(1);
  else if(k==="ne") html=catPanel(2);
  else if(k==="esc") html=escPanel();
  else if(k==="evi") html=eviPanel();
  else html=revPanel();
  var nav='<div class="foot-nav">'
    + (state.step>0 ? '<button class="navbtn" data-nav="-1">\u2190 Back</button>' : '<span></span>')
    + (state.step<STEPS.length-1 ? '<button class="navbtn next" data-nav="1">Next \u2192</button>' : '<span></span>')
    +'</div>';
  el("panel").innerHTML = html + (k==="rev"? "" : nav);
}

/* ---------------- live panel ---------------- */
function renderLive(){
  var fc=finalCard(), pct=Math.max(0,Math.min(100,fc.score));
  var n=scoredCount(), tot=totalCount();
  var R=52, C=2*Math.PI*R, off=C*(1-pct/100);
  var stroke = n? (fc.key==="green"?"var(--green)":fc.key==="amber"?"var(--amber)":"var(--red)") : "#c7ced7";
  var chipCls = n? fc.key : "idle";
  var bars=catTotals().map(function(c){
    return '<div class="bar"><div class="top"><b>'+esc(c.cat)+'</b><span>'+c.got.toFixed(0)+'/'+c.max+'</span></div>'
      +'<div class="track"><div class="fill" style="width:'+c.pct.toFixed(0)+'%"></div></div></div>';
  }).join("");
  el("live").innerHTML =
    '<div class="gaugecard">'
      +'<div class="eyebrow" style="text-align:center;margin-bottom:6px">Live result</div>'
      +'<div class="gauge"><svg width="150" height="150" viewBox="0 0 128 128">'
        +'<circle cx="64" cy="64" r="'+R+'" fill="none" stroke="#eef1f5" stroke-width="13"/>'
        +'<circle cx="64" cy="64" r="'+R+'" fill="none" stroke="'+stroke+'" stroke-width="13" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/>'
      +'</svg><div class="center"><div class="num">'+(n?fc.score.toFixed(0):"\u2013")+'</div><div class="den">/ 100</div></div></div>'
      +'<div class="cardchip '+chipCls+'"><span class="sq"></span>'+(n?esc(CARD[fc.key].name):"Awaiting input")+'</div>'
      + (fc.overrideKey&&SEV[fc.overrideKey]>SEV[fc.scoreKey] ? '<div class="prov">Card escalated by a trigger</div>' : '')
      +'<div class="completion"><span>Indicators scored</span><b>'+n+' / '+tot+'</b></div>'
    +'</div>'
    +'<div class="gaugecard"><div class="eyebrow" style="margin-bottom:12px">Category breakdown</div><div class="bars">'+bars+'</div></div>';

  var tEl=el("topScore");
  if(tEl){
    var tName = n ? CARD[fc.key].name.replace(" Card","") : "Awaiting input";
    tEl.innerHTML =
      '<span class="ts-lab">Live score</span>'
      +'<span class="ts-num">'+(n?fc.score.toFixed(1):"\u2013")+'<small>/100</small></span>'
      +'<span class="ts-chip '+chipCls+'"><span class="d"></span>'+esc(tName)+'</span>';
  }
}

/* ---------------- report ---------------- */
function fmtMonth(iso){ if(!iso)return ""; var p=iso.split("-"); var mo=["January","February","March","April","May","June","July","August","September","October","November","December"]; return mo[(+p[1])-1]+" "+p[0]; }
function fmtDate(iso){ if(!iso)return ""; var d=new Date(iso+"T00:00:00"); if(isNaN(d))return iso; return d.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"}); }

function renderReport(){
  var fc=finalCard(), c=CARD[fc.key], m=state.meta;
  var cats=catTotals();
  // indicator table
  var rows=CRITERIA.map(function(cat){
    var head='<tr class="catrow"><td colspan="5">'+esc(cat.cat)+'</td></tr>';

                  : (b!=null? it.bands[b] : "\u2013");
      var scaleLab = b!=null ? SCALE[b] : "Not scored";
      var cls = b===0?"b0":b===4?"b4":"";
      return '<tr class="'+cls+'"><td>'+esc(it.name)+'</td>'
        +'<td class="bandtag">'+esc(scaleLab)+'</td>'
        +'<td>'+esc(bandLab)+'</td>'

      return '<tr><td>'+esc(a.action)+'</td><td>'+esc(a.owner)+'</td><td>'+esc(a.due)+'</td></tr>'; }).join("")
      || '<tr><td colspan="3" style="color:var(--muted)">No actions recorded.</td></tr>';
    notice='<div class="rep-section pb"><h3>Supplier Escalation Notice</h3>'
      +'<div class="notice '+fc.key+'"><div class="nh"><h3>Supplier Escalation Notice</h3>'
        +'<div class="ref">Ref. '+esc(m.ref)+'<br>'+esc(fmtDate(m.dateIssue))+'</div></div>'
      +'<div class="nbody">'
        +'<div class="ngrid">'
          +'<div><div class="nrow"><span class="k">Supplier</span><span class="v">'+esc(m.supplier||"\u2014")+'</span></div>'
            +'<div class="nrow"><span class="k">Site / location</span><span class="v">'+esc(m.site||"\u2014")+'</span></div>'
            +'<div class="nrow"><span class="k">NCR number</span><span class="v">'+esc(e.ncr||"\u2014")+'</span></div></div>'
          +'<div><div class="nrow"><span class="k">Recurring</span><span class="v">'+esc(e.recurring||"\u2014")+'</span></div>'
            +'<div class="nrow"><span class="k">Financial impact</span><span class="v">'+esc(e.financial||"\u2014")+'</span></div>'
            +'<div class="nrow"><span class="k">Issue type</span></div><div class="issue-tags">'+itags+'</div></div>'
        +'</div>'
        +'<div class="ngrid" style="margin-top:8px"><div class="nblock"><h5>Problem description</h5><div class="txt">'+esc(e.problem||"")+'</div></div>'
          +'<div class="nblock"><h5>Defect image</h5>'+(e.defect?'<div class="ndefect"><img src="'+esc(e.defect)+'" alt="Defect"></div>':'<div class="ndefect" style="display:grid;place-items:center;color:#9fb0c3;font-size:12px">No image</div>')+'</div></div>'
        +'<div class="nblock"><h5>Actions required</h5><table class="naction"><thead><tr><th>Action</th><th>Owner</th><th>Due date</th></tr></thead><tbody>'+arows+'</tbody></table></div>'

/* ---------------- persistence ---------------- */
var LS_KEY="supplier_qa_scorecards_v1";
function lsGet(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch(e){ return []; } }
function lsSet(arr){ try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); return true; }catch(e){ return false; } }
function saveCurrent(){
  if(!state.meta.supplier.trim()){ alert("Add a supplier name before saving."); return; }
  var arr=lsGet();
  var id=(state.meta.supplier+"|"+state.meta.month).toLowerCase();
  var rec={ id:id, supplier:state.meta.supplier, month:state.meta.month, ts:Date.now(), data:JSON.parse(JSON.stringify(state)) };
  var i=arr.findIndex(function(r){return r.id===id;});
  if(i>=0) arr[i]=rec; else arr.unshift(rec);
  if(lsSet(arr)){ renderSaved(); flash(el("btnSave"),"Saved \u2713"); }
  else alert("Couldn't save to this browser's storage. Use Export JSON to keep a copy instead.");
}
function flash(btn,txt){ var o=btn.innerHTML; btn.innerHTML=txt; setTimeout(function(){btn.innerHTML=o;},1400); }
function renderSaved(){
  var arr=lsGet(); el("savedCount").textContent=arr.length?("("+arr.length+")"):"";
  el("savedList").innerHTML = arr.length? arr.map(function(r){
    return '<div class="menu-row" data-load="'+esc(r.id)+'"><div class="meta"><b>'+esc(r.supplier)+'</b><span>'+esc(fmtMonth(r.month))+' \u00B7 saved '+esc(fmtDate(new Date(r.ts).toISOString().slice(0,10)))+'</span></div>'
      +'<button class="del" data-del="'+esc(r.id)+'" title="Delete">Delete</button></div>';
  }).join("") : '<div class="menu-empty">No saved evaluations yet.</div>';
}
function loadRec(id){ var r=lsGet().find(function(x){return x.id===id;}); if(!r)return; state=JSON.parse(JSON.stringify(r.data)); if(state.step==null)state.step=0; el("savedMenu").classList.remove("open"); renderAll(); }
function delRec(id){ if(!confirm("Delete this saved evaluation?"))return; var arr=lsGet().filter(function(x){return x.id!==id;}); lsSet(arr); renderSaved(); }

/* ---------------- events ---------------- */
function renderAll(){ renderSteps(); renderPanel(); renderLive(); }

el("steps").addEventListener("click",function(e){ var b=e.target.closest("[data-step]"); if(!b)return; state.step=+b.dataset.step; renderAll(); });

el("panel").addEventListener("click",function(e){
  var t=e.target;
  var band=t.closest("[data-band]"); if(band){ var ind=band.closest(".indicator"); state.ratings[ind.dataset.id]=+band.dataset.band; renderAll(); return; }
  var crit=t.closest("[data-crit]"); if(crit){ var ind2=crit.closest(".indicator"); var v=+crit.dataset.crit; state.ratings[ind2.dataset.id]=v; if(ind2.dataset.id==="pq2") state.esc.critical=(v===0); renderAll(); return; }
  var occ=t.closest("[data-occ]"); if(occ){ state.esc.occurrence=occ.dataset.occ; renderAll(); return; }
  var nav=t.closest("[data-nav]"); if(nav){ state.step=Math.max(0,Math.min(STEPS.length-1,state.step+ (+nav.dataset.nav))); renderAll(); window.scrollTo({top:0,behavior:"smooth"}); return; }
  var actrm=t.closest("[data-actrm]"); if(actrm){ state.esc.actions.splice(+actrm.dataset.actrm,1); renderPanel(); return; }
  var evirm=t.closest("[data-evirm]"); if(evirm){ state.evidence.splice(+evirm.dataset.evirm,1); renderPanel(); renderLive(); return; }
  if(t.id==="addAction"){ state.esc.actions.push({action:"",owner:"",due:""}); renderPanel(); return; }
  if(t.id==="genBtn2"){ openReport(); return; }
  if(t.id==="defectRm"){ state.esc.defect=null; renderPanel(); return; }
  if(t.closest("#defectDrop")){ el("defectFile").click(); return; }
  if(t.closest("#eviDrop")){ el("eviFile").click(); return; }
});

el("panel").addEventListener("input",function(e){
  var t=e.target;
  if(t.dataset.field!=null){ var v=t.value; if(t.type==="number")v=v===""?0:+v; set(state,t.dataset.field,v);
    if(t.dataset.field==="meta.supplier") renderSteps();
    if(t.dataset.field==="overall"){} renderLiveSoft(t.dataset.field); return; }
  if(t.dataset.note!=null){ state.notes[t.dataset.note]=t.value; renderSteps(); return; }
  if(t.dataset.cap!=null){ state.evidence[+t.dataset.cap].caption=t.value; return; }
  if(t.dataset.act!=null){ var p=t.dataset.act.split("."); state.esc.actions[+p[0]][p[1]]=t.value; return; }
});
function renderLiveSoft(field){ if(field&&field.indexOf("thresholds")===0) renderLive(); }

el("panel").addEventListener("change",function(e){
  var t=e.target;
  if(t.dataset.issue!=null){ state.esc.issue[t.dataset.issue]=t.checked; var lab=t.closest(".chip"); if(lab)lab.dataset.on=t.checked?1:0; return; }
  if(t.dataset.restrict!=null){ state.esc.restrict[t.dataset.restrict]=t.checked; var lab2=t.closest(".chip"); if(lab2)lab2.dataset.on=t.checked?1:0; return; }
  if(t.id==="critChk"){ state.esc.critical=t.checked; var lab3=t.closest(".chip"); if(lab3)lab3.dataset.on=t.checked?1:0; renderLive(); return; }
  if(t.id==="defectFile" && t.files[0]){ readImage(t.files[0],function(d){ state.esc.defect=d; renderPanel(); }); return; }
  if(t.id==="eviFile" && t.files.length){ var files=Array.prototype.slice.call(t.files); var left=files.length;
    files.forEach(function(f){ readImage(f,function(d){ state.evidence.push({data:d,caption:""}); left--; if(left===0){ renderPanel(); renderLive(); } }); }); t.value=""; return; }
});

/* top bar */
el("btnNew").addEventListener("click",function(){ if(confirm("Start a new blank evaluation? Unsaved changes will be lost.")){ state=blankState(); renderAll(); } });
el("btnSave").addEventListener("click",saveCurrent);
el("btnSaved").addEventListener("click",function(e){ e.stopPropagation(); el("savedMenu").classList.toggle("open"); });
document.addEventListener("click",function(e){ if(!e.target.closest("#savedMenu")) el("savedMenu").classList.remove("open"); });
el("savedList").addEventListener("click",function(e){ var d=e.target.closest("[data-del]"); if(d){ e.stopPropagation(); delRec(d.dataset.del); return; } var l=e.target.closest("[data-load]"); if(l) loadRec(l.dataset.load); });
el("btnExport").addEventListener("click",function(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=(state.meta.supplier||"supplier").replace(/[^\w]+/g,"_")+"_"+state.meta.month+"_scorecard.json"; a.click();
});
el("btnImport").addEventListener("click",function(){ el("importFile").click(); });
el("importFile").addEventListener("change",function(e){ var f=e.target.files[0]; if(!f)return; var fr=new FileReader(); fr.onload=function(){ try{ var o=JSON.parse(fr.result); state=Object.assign(blankState(),o); if(state.step==null)state.step=0; renderAll(); el("savedMenu").classList.remove("open"); }catch(err){ alert("That file isn't a valid scorecard JSON."); } }; fr.readAsText(f); e.target.value=""; });

el("btnGenerate").addEventListener("click",openReport);
el("btnBack").addEventListener("click",function(){ document.body.classList.remove("report-view"); window.scrollTo(0,0); });
el("btnDownloadPdf").addEventListener("click",downloadPDF);
el("btnDownloadHtml").addEventListener("click",downloadReportHTML);

function openReport(){ if(!state.meta.supplier.trim()){ alert("Add a supplier name first (Supplier tab)."); state.step=0; renderAll(); return; } renderReport(); document.body.classList.add("report-view"); window.scrollTo(0,0); }

/* Shared helpers */
function ensureReport(){ if(!document.body.classList.contains("report-view")){ openReport(); } return document.body.classList.contains("report-view"); }
function fileBase(){ return (state.meta.supplier||"supplier").replace(/[^\w]+/g,"_")+"_"+(state.meta.month||""); }

/* Primary action: render the scorecard to an actual PDF file and download it
   (no print dialog). Uses html2canvas + jsPDF. If those aren't available
   (e.g. opened offline with no internet), falls back to the HTML download. */
function downloadPDF(){
  if(!ensureReport()) return;
  var btn=el("btnDownloadPdf");
  var libsReady = window.html2canvas && window.jspdf && window.jspdf.jsPDF;
  if(!libsReady){
    alert("The PDF generator couldn't load (no internet connection?). Downloading a self-contained HTML copy instead \u2014 open it in any browser and it will display the full scorecard.");
    downloadReportHTML();
    return;
  }
  var orig=btn.innerHTML; btn.disabled=true; btn.style.opacity=".65"; btn.innerHTML="Generating PDF\u2026";
  var restore=function(){ btn.disabled=false; btn.style.opacity=""; btn.innerHTML=orig; };
  var sheet=el("sheet");
  window.html2canvas(sheet,{scale:2,backgroundColor:"#ffffff",useCORS:true,logging:false,windowWidth:sheet.scrollWidth})
    .then(function(canvas){
      var imgData=canvas.toDataURL("image/jpeg",0.92);
      var jsPDF=window.jspdf.jsPDF;
      var pdf=new jsPDF("p","mm","a4");
      var pageW=pdf.internal.pageSize.getWidth();
      var pageH=pdf.internal.pageSize.getHeight();
      var imgW=pageW;
      var imgH=canvas.height*imgW/canvas.width;
      var heightLeft=imgH, position=0;
      pdf.addImage(imgData,"JPEG",0,position,imgW,imgH,undefined,"FAST");
      heightLeft-=pageH;
      while(heightLeft>0){                 // spill a tall scorecard across multiple A4 pages
        position-=pageH;
        pdf.addPage();
        pdf.addImage(imgData,"JPEG",0,position,imgW,imgH,undefined,"FAST");
        heightLeft-=pageH;
      }
      pdf.save(fileBase()+"_scorecard.pdf");
      restore();
    })
    .catch(function(err){
      restore();
      alert("Sorry, the PDF couldn't be generated here. Downloading a self-contained HTML copy instead.");
      downloadReportHTML();
    });
}

/* Build a fully self-contained HTML document of just the scorecard, carrying
   all the styles so it displays identically in any browser. */
function reportDocHTML(){
  var styles=""; var ss=document.querySelectorAll("style");
  for(var i=0;i<ss.length;i++){ styles+=ss[i].textContent+"\n"; }
  var title="Supplier QA Scorecard \u2013 "+(state.meta.supplier||"Supplier")+" "+fmtMonth(state.meta.month);
  return '<!doctype html><html lang="en"><head><meta charset="utf-8">'
    +'<meta name="viewport" content="width=device-width, initial-scale=1">'
    +'<title>'+esc(title)+'</title><style>'+styles+'</style>'
    +'<style>html,body{background:#fff;margin:0} #report{display:block!important} .report-toolbar{display:none!important} .sheet{margin:18px auto}</style>'
    +'</head><body class="report-view"><div id="report"><div class="sheet">'+el("sheet").innerHTML+'</div></div></body></html>';
}

function downloadReportHTML(){
  if(!ensureReport()) return;
  try{
    var blob=new Blob([reportDocHTML()],{type:"text/html"});
    var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=fileBase()+"_scorecard.html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); },1000);
  }catch(e){ alert("Couldn't generate the download in this environment. Try opening the app as a downloaded file."); }
}

/* boot */
renderAll(); renderSaved();
</script>
